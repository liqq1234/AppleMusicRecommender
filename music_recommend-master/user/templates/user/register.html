{% extends 'base.html' %}
{% block right-panel-content %}
    <div class="auth-container">
        <div class="auth-card">
            <h2>用户注册</h2>
            {% if error %}
                <div class="alert alert-danger" style="background: rgba(250, 45, 72, 0.1); border: none; color: #ff3b5c; border-radius: 10px;">
                    {{ error }}
                </div>
            {% endif %}
            <form action="{% url 'register' %}" method='post' autocomplete="on">
                {% csrf_token %}
                {% for field in form %}
                    <div class="form-group">
                        {{ field.label_tag }}
                        {{ field.errors }}
                        {{ field }}
                    </div>
                {% endfor %}
                <div class="auth-btn-group">
                    <button type="submit" class="btn-auth-submit">
                        <span class="glyphicon glyphicon-ok"></span> 创建通行证
                    </button>
                    <button type="reset" class="btn-auth-reset">
                        <span class="glyphicon glyphicon-remove"></span>
                    </button>
                </div>
            </form>
            <div class="auth-footer">
                已有账号？<a href="{% url 'login' %}">立即登录</a>
            </div>
        </div>
    </div>
{% endblock %}
